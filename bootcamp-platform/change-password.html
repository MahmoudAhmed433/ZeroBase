<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Change Password | ZeroBase</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="container nav-wrap">
        <div class="brand">ZeroBase Board</div>
        <nav class="nav-links">
          <a href="index.html">Home</a>
          <a href="browse.html">Browse</a>
          <a href="settings.html">Settings</a>
        </nav>
      </div>
    </header>

    <main class="auth-page">
      <section class="auth-card">
        <h1 class="auth-title">Change password</h1>
        <p class="small">Use a strong password you have not used elsewhere.</p>
        <form id="pwForm" class="auth-step">
          <label class="small" for="oldPw">Current password</label>
          <input id="oldPw" type="password" autocomplete="current-password" required />
          <label class="small" for="newPw">New password</label>
          <input id="newPw" type="password" autocomplete="new-password" required />
          <label class="small" for="newPw2">Confirm new password</label>
          <input id="newPw2" type="password" autocomplete="new-password" required />
          <button type="submit">Update password</button>
        </form>
        <p id="pwMsg" class="small"></p>
        <p class="small"><a href="settings.html">← Back to settings</a></p>
      </section>
    </main>

    <script src="js/data.js"></script>
    <script src="js/zb-api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/change-password.js"></script>
  </body>
</html>
